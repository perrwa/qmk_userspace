name: Draw keymaps
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "keyboards/**/keymap.c"
      - "keymap_drawer.config.yaml"
      - "keymap-drawer/*.yaml"

concurrency:
  group: draw
  cancel-in-progress: true

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pipx install keymap-drawer

      - name: Draw SVGs
        run: |
          for yaml in keymap-drawer/*.yaml; do
            keymap -c keymap_drawer.config.yaml draw "$yaml" \
              -o "${yaml%.yaml}.svg"
          done

      - name: Generate keymap-drawer README
        run: |
          cd keymap-drawer
          shopt -s nullglob
          {
            echo "# Keymap Visualizations"
            echo ""
            echo "Auto-generated from keymap YAML definitions via [keymap-drawer](https://github.com/caksoylar/keymap-drawer)."
            for svg in *.svg; do
              name="${svg%.svg}"
              echo ""
              echo "## ${name}"
              echo ""
              echo "![${name}](${svg})"
            done
          } > README.md

      - name: Commit updated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'keymap-drawer/*.svg keymap-drawer/README.md'
          commit_message: "chore: update keymap-drawer visualizations"
