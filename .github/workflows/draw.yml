name: Draw keymaps
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "keyboards/**/keymap.c"
      - "keymap_drawer.config.yaml"
      - "keymap-drawer/*.yaml"

concurrency:
  group: draw
  cancel-in-progress: true

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pipx install keymap-drawer

      - name: Parse keymaps
        run: |
          jq -r '.build_targets[] | "\(.[0]) \(.[1])"' qmk.json | while read -r kb km; do
            # Derive short keyboard name by stripping revision/variant suffixes
            name=$(echo "$kb" | tr '/' '\n' \
              | grep -vE '^(rev[0-9]+|avr|rp2040|stm32|nrf52|arm|ble|usb)$' \
              | tail -1)
            keymap_c="keyboards/${kb}/keymaps/${km}/keymap.c"
            if [ -f "$keymap_c" ]; then
              echo "Parsing ${kb}:${km} → keymap-drawer/${name}.yaml"
              keymap parse -c keymap_drawer.config.yaml -q "$kb" "$keymap_c" \
                > "keymap-drawer/${name}.yaml"
            fi
          done

      - name: Draw SVGs
        run: |
          for yaml in keymap-drawer/*.yaml; do
            keymap -c keymap_drawer.config.yaml draw "$yaml" \
              -o "${yaml%.yaml}.svg"
          done

      - name: Generate keymap-drawer README
        run: |
          cd keymap-drawer
          shopt -s nullglob
          {
            echo "# Keymap Visualizations"
            echo ""
            echo "Auto-generated from keymap YAML definitions via [keymap-drawer](https://github.com/caksoylar/keymap-drawer)."
            for svg in *.svg; do
              name="${svg%.svg}"
              echo ""
              echo "## ${name}"
              echo ""
              echo "![${name}](${svg})"
            done
          } > README.md

      - name: Commit updated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'keymap-drawer/*.yaml keymap-drawer/*.svg keymap-drawer/README.md'
          commit_message: "chore: update keymap-drawer visualizations"
